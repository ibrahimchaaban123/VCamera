cat > .github/workflows/build.yml << 'EOF'
name: Build VCamera APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install SDK
        run: sdkmanager --install "platforms;android-36" "build-tools;34.0.0"
      - name: Generate and Build
        run: |
          mkdir -p VCamera/app/src/main/{java/com/vcamera/app/{ui,service,camera,model},res/{layout,values,drawable,mipmap-anydpi-v26,xml}}
          mkdir -p VCamera/{.github/workflows,gradle/wrapper}
          curl -sL https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar -o VCamera/gradle/wrapper/gradle-wrapper.jar
          curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew -o VCamera/gradlew && chmod +x VCamera/gradlew
          cat > VCamera/settings.gradle << 'SETTINGS'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "VCamera"
          include ':app'
          SETTINGS
          cat > VCamera/build.gradle << 'RG'
          plugins { id 'com.android.application' version '8.2.2' apply false; id 'org.jetbrains.kotlin.android' version '1.9.22' apply false }
          RG
          cat > VCamera/gradle.properties << 'GP'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          kotlin.code.style=official
          GP
          cat > VCamera/gradle/wrapper/gradle-wrapper.properties << 'GWP'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          GWP
          echo "Done"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VCamera-APK
          path: VCamera/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
EOF
